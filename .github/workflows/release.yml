name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version and broken-flag from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BROKEN="0"
          if [[ "$TAG" == *"-broken"* ]]; then
            BROKEN="1"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "broken=${BROKEN}" >> "$GITHUB_OUTPUT"

      - name: Build release package
        run: |
          mkdir -p build/pyupdate-demo
          cp -r app build/pyupdate-demo/app
          cat > build/pyupdate-demo/VERSION <<VEREOF
          APP_VERSION=${{ steps.meta.outputs.version }}
          APP_BROKEN=${{ steps.meta.outputs.broken }}
          VEREOF
          tar -C build -czf pyupdate-demo-v${{ steps.meta.outputs.version }}.tar.gz pyupdate-demo
          sha256sum pyupdate-demo-v${{ steps.meta.outputs.version }}.tar.gz \
            > pyupdate-demo-v${{ steps.meta.outputs.version }}.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            pyupdate-demo-v${{ steps.meta.outputs.version }}.tar.gz
            pyupdate-demo-v${{ steps.meta.outputs.version }}.tar.gz.sha256
